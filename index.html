<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Bar Inventory</title>
  </head>
  <body>
    <script>
      const originalError = console.error;
      console.error = (...args) => {
        if (typeof args[0] === 'string' && /ResizeObserver/.test(args[0])) return;
        originalError(...args);
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
